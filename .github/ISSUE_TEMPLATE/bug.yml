name: Bug Report
description: Report a bug that occurred while playing the game.
labels: [type: bug]
title: "Bug Report: "
body:
  - type: markdown
    attributes:
      value: "## Describe your bug."

  - type: textarea
    attributes:
      label: "Description (include any images, videos, errors, etc.)"
      description: Provide a detailed description of your bug.
      placeholder: Describe your bug here...
    validation:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: What steps can other people take to reliably encounter this issue?
      placeholder: 1. Open the game...